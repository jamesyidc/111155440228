<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试对冲底仓开关</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-card { background: white; padding: 20px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 14px; }
        .status { padding: 5px 10px; border-radius: 4px; display: inline-block; font-weight: 600; }
        .enabled { background: #d1fae5; color: #047857; }
        .disabled { background: #fee2e2; color: #dc2626; }
        #log { background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🌙 对冲底仓开关测试</h1>
    
    <div class="test-card">
        <h2>当前状态</h2>
        <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
            <span>🔵 启用自动开单</span>
            <span id="statusBadge" class="status">加载中...</span>
            <input type="checkbox" id="checkbox">
        </div>
        <div style="margin-top: 10px;">
            <button onclick="loadConfig()">🔄 加载配置</button>
            <button onclick="toggleEnable(true)" style="background: #10b981; color: white; border: none;">✅ 开启</button>
            <button onclick="toggleEnable(false)" style="background: #ef4444; color: white; border: none;">⏸️ 关闭</button>
        </div>
    </div>
    
    <div class="test-card">
        <h2>📋 操作日志</h2>
        <div id="log"></div>
    </div>
    
    <script>
        const accountId = 'account_main';
        
        function log(message, isError = false) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = isError ? '#dc2626' : '#047857';
            logEl.innerHTML += `<div style="color: ${color};">[${time}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(message);
        }
        
        async function loadConfig() {
            log('📥 开始加载配置...');
            try {
                const response = await fetch(`/api/okx-trading/midnight-hedge/${accountId}`);
                const data = await response.json();
                
                if (data.success) {
                    const config = data.config;
                    log(`✅ 配置加载成功: enabled=${config.enabled}`);
                    
                    // 更新UI
                    document.getElementById('checkbox').checked = config.enabled;
                    
                    const statusEl = document.getElementById('statusBadge');
                    if (config.enabled) {
                        statusEl.textContent = '✅ 已启用';
                        statusEl.className = 'status enabled';
                    } else {
                        statusEl.textContent = '⏸️ 已禁用';
                        statusEl.className = 'status disabled';
                    }
                    
                    log(`✅ UI已更新`);
                } else {
                    throw new Error(data.error || '加载失败');
                }
            } catch (error) {
                log(`❌ 加载失败: ${error.message}`, true);
            }
        }
        
        async function toggleEnable(enabled) {
            log(`🔄 ${enabled ? '开启' : '关闭'}开关...`);
            try {
                const response = await fetch(`/api/okx-trading/midnight-hedge/${accountId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        enabled: enabled
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log(`✅ ${enabled ? '开启' : '关闭'}成功`);
                    log(`📝 API返回: enabled=${data.config.enabled}`);
                    
                    // 重新加载配置验证
                    setTimeout(() => {
                        log('🔍 验证配置是否保存...');
                        loadConfig();
                    }, 500);
                } else {
                    throw new Error(data.message || '更新失败');
                }
            } catch (error) {
                log(`❌ 更新失败: ${error.message}`, true);
            }
        }
        
        // 页面加载时自动加载配置
        window.onload = () => {
            log('🚀 页面加载完成');
            loadConfig();
        };
    </script>
</body>
</html>
